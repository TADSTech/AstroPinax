<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroPinax — New Tab</title>
    <link rel="stylesheet" href="/src/theme.css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="starfield"></canvas>

    <div id="app">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="logo">Astro<span class="logo-accent">Pinax</span></h1>
        </div>
        <div class="topbar-right">
          <button class="btn-icon" id="btn-theme" title="Toggle theme (Space/Void)">
            <svg class="icon-space" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 12h18M18.36 5.64l-12.72 12.72M5.64 5.64l12.72 12.72"/></svg>
            <svg class="icon-void" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          
          <!-- Unified Glowing Date Widget -->
          <button class="date-widget" id="date-widget-btn" title="Pick a date">
            <svg class="calendar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span class="date-display" id="date-display"></span>
          </button>
          <input type="date" id="datepicker" />
        </div>
      </header>

      <main id="content">
        <section class="apod-section" id="apod-section">
          <div id="apod-view" class="apod-view loading">
            <!-- Background Layer -->
            <div class="apod-media" id="apod-media-container">
              <img id="apod-image" src="" alt="" />
              <iframe id="apod-video" class="hidden" src="" allowfullscreen></iframe>
            </div>

            <!-- Dark overlay for legibility -->
            <div class="dark-overlay"></div>

            <!-- Foreground Layer (Search + Text) -->
            <div class="foreground-ui">
              <section class="search-section">
                <form id="search-form" action="https://www.google.com/search" method="GET" target="_self">
                  <div class="search-wrapper" id="search-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" name="q" id="search-input" placeholder="Search the cosmos or type a URL…" autocomplete="off" spellcheck="false" autofocus />
                  </div>
                  <!-- Command suggestions dropdown -->
                  <div id="suggestions-box" class="suggestions-box hidden"></div>
                </form>
              </section>

              <div class="apod-info" id="apod-info-container">
                <div class="apod-meta">
                  <span class="apod-date" id="apod-date-label"></span>
                  <span class="apod-badge hidden" id="apod-badge">APOD</span>
                </div>
                <h2 class="apod-title" id="apod-title"></h2>
                <div class="apod-explanation" id="apod-explanation"></div>
                <p id="error-message" class="error-message hidden"></p>
                <button class="btn btn-primary btn-sm hidden" id="btn-retry">Try again</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span class="footer-sig">Sudotads</span>
        <span class="footer-nasa">Powered by NASA APOD</span>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
